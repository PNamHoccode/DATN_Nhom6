<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" 
 th:replace="~{/share/layout::dynamic(~{::main})}">
 <html lang="en">
<head>
    <meta charset="utf-8">
    <title>MultiShop - Online Shop Website Template</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="Free HTML Templates" name="keywords">
    <meta content="Free HTML Templates" name="description">

    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">  

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="lib/animate/animate.min.css" rel="stylesheet">
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
   


   
<main th:fragment="main"> 

    <!-- Breadcrumb Start -->
    <div class="container-fluid">
        <div class="row px-xl-5">
            <div class="col-12">
                <nav class="breadcrumb bg-light mb-30">
                    <a class="breadcrumb-item text-dark" href="#">Home</a>
                    <a class="breadcrumb-item text-dark" href="#">Shop</a>
                    <span class="breadcrumb-item active">Shopping Cart</span>
                </nav>
            </div>
        </div>
    </div>
    <!-- Breadcrumb End -->


    <!-- Cart Start -->
   
    <div class="container-fluid">
        <div class="row px-xl-5">
            <div class="col-lg-8 table-responsive mb-5">
		     <form method="post">
                <table class="table table-light table-borderless table-hover text-center mb-0">
                    <thead class="thead-dark">
                        <tr>
							<th>Productsid</th>
							<th>Productimg</th>
                            <th>Products</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Total</th>
                            <th>Remove</th>
                        </tr>
                    </thead>
                    <tbody class="align-middle" >                     
                        <tr ng-repeat="item in cart.items">
							<td class="align-middle" >{{item.id}}</td>
							<td class="align-middle" ><img src="{{item.image}}" alt="Product Image" class="img-fluid" style="width: 100px; height: 100px;"></td>
                            <td class="align-middle"> {{item.name}}</td>
                            <td class="align-middle" >{{item.price}}</td>
                            <td>                             
                            	  <input ng-change="cart.saveToLocalStorage()" ng-model="item.qty" type="number" >
                            
                            </td>
                           
                          
                            <td class="align-middle">${{item.qty*item.price|number:2}}</td>
                            <td class="align-middle"><a class="btn btn-sm btn-danger" ><i class="fa fa-times" ng-click="cart.remove(item.id)"></i></a></td>
                        </tr>
                                                				              
		  	            
                    </tbody>
                    
                 </table>
                <div class="pt-2">
                        <div class="d-flex justify-content-between mt-2">
                            <h5>Total</h5>
                            <h5 >${{cart.amount|number:2}}</h5>
                        </div>
                        <a	 class="btn btn-block btn-primary font-weight-bold my-3 py-3"  th:href="@{/order/checkout}">Proceed To Checkout</a>
                    </div>
                 <div>
				<button  ng-click="cart.clear()"  class="btn btn-primary px-3"> Clear Cart</button>
				<a class="btn btn-primary px-3" th:href="@{/product/list}"> Quay lại Shop</a>
				
				
			
				
			 
			    </div>
		      </from>
            </div>
                
        
          
    <!-- Cart End -->

</main>
  


    
</body>

</html>
